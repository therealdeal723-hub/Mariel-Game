<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Chanel Classic Flap - quilted, chain strap, CC -->
  <g transform="translate(64,64)">
    <!-- Chain strap -->
    <path d="M-20,-32 Q-20,-45 0,-45 Q20,-45 20,-32" stroke="#daa520" stroke-width="2.5" fill="none"/>
    <!-- Woven leather through chain -->
    <path d="M-20,-32 Q-20,-45 0,-45 Q20,-45 20,-32" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-dasharray="4,4" opacity="0.5"/>
    <!-- Main body -->
    <rect x="-35" y="-28" width="70" height="48" rx="4" fill="#1a1a1a"/>
    <!-- Flap -->
    <path d="M-35,-28 L35,-28 L35,-5 Q0,5 -35,-5Z" fill="#222222"/>
    <!-- Quilted diamond pattern -->
    <g stroke="#333" stroke-width="0.6" fill="none" opacity="0.6">
      <line x1="-35" y1="-8" x2="35" y2="-8" transform="rotate(45,0,0)"/>
      <line x1="-35" y1="8" x2="35" y2="8" transform="rotate(45,0,0)"/>
      <line x1="-35" y1="24" x2="35" y2="24" transform="rotate(45,0,0)"/>
      <line x1="-35" y1="-8" x2="35" y2="-8" transform="rotate(-45,0,0)"/>
      <line x1="-35" y1="8" x2="35" y2="8" transform="rotate(-45,0,0)"/>
      <line x1="-35" y1="24" x2="35" y2="24" transform="rotate(-45,0,0)"/>
    </g>
    <!-- CC Logo turn-lock -->
    <circle cx="0" cy="-2" r="8" fill="#daa520" opacity="0.9"/>
    <!-- CC letters -->
    <text x="-5" y="2" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a">C</text>
    <text x="0" y="2" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a" transform="scale(-1,1) translate(-5,0)">C</text>
    <!-- Bottom edge highlight -->
    <line x1="-33" y1="18" x2="33" y2="18" stroke="#333" stroke-width="0.5"/>
  </g>
</svg>
