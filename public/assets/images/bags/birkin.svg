<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Birkin Bag - structured, trapezoidal -->
  <g transform="translate(64,64)">
    <!-- Handles -->
    <path d="M-15,-30 Q-15,-42 -8,-42 Q-4,-42 -4,-30" stroke="#8b5e3c" stroke-width="3" fill="none"/>
    <path d="M4,-30 Q4,-42 8,-42 Q15,-42 15,-30" stroke="#8b5e3c" stroke-width="3" fill="none"/>
    <!-- Main body -->
    <path d="M-38,30 L-32,-25 L32,-25 L38,30Z" fill="#c4874a"/>
    <!-- Flap -->
    <path d="M-32,-25 L32,-25 L28,-15 L-28,-15Z" fill="#b87840"/>
    <!-- Strap and turn-lock -->
    <rect x="-3" y="-20" width="6" height="12" rx="1" fill="#d4a060"/>
    <circle cx="0" cy="-8" r="4" fill="#daa520" stroke="#c49520" stroke-width="1"/>
    <rect x="-2" y="-10" width="4" height="4" rx="1" fill="#eec040"/>
    <!-- Side stitching -->
    <line x1="-35" y1="20" x2="-32" y2="-20" stroke="#a06830" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="35" y1="20" x2="32" y2="-20" stroke="#a06830" stroke-width="0.8" stroke-dasharray="3,3"/>
    <!-- Bottom stitch line -->
    <line x1="-36" y1="25" x2="36" y2="25" stroke="#a06830" stroke-width="0.8" stroke-dasharray="3,3"/>
    <!-- Feet -->
    <circle cx="-25" cy="32" r="2.5" fill="#daa520"/>
    <circle cx="25" cy="32" r="2.5" fill="#daa520"/>
    <circle cx="-10" cy="32" r="2.5" fill="#daa520"/>
    <circle cx="10" cy="32" r="2.5" fill="#daa520"/>
    <!-- Leather texture highlight -->
    <rect x="-30" y="-12" width="60" height="40" rx="2" fill="url(#birkinSheen)" opacity="0.15"/>
    <defs>
      <linearGradient id="birkinSheen" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="white"/>
        <stop offset="1" stop-color="transparent"/>
      </linearGradient>
    </defs>
  </g>
</svg>
