<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Louis Vuitton Neverfull - tote with monogram pattern -->
  <g transform="translate(64,64)">
    <!-- Handles -->
    <path d="M-18,-28 Q-22,-44 -15,-44 Q-10,-44 -12,-28" stroke="#c4874a" stroke-width="3" fill="none"/>
    <path d="M12,-28 Q10,-44 15,-44 Q22,-44 18,-28" stroke="#c4874a" stroke-width="3" fill="none"/>
    <!-- Main body (wider at top) -->
    <path d="M-40,-25 L-30,32 L30,32 L40,-25Z" fill="#c4943a"/>
    <!-- Monogram pattern -->
    <g fill="#a07828" opacity="0.4">
      <circle cx="-20" cy="-10" r="3"/>
      <circle cx="0" cy="-10" r="3"/>
      <circle cx="20" cy="-10" r="3"/>
      <circle cx="-10" cy="5" r="3"/>
      <circle cx="10" cy="5" r="3"/>
      <circle cx="-20" cy="20" r="3"/>
      <circle cx="0" cy="20" r="3"/>
      <circle cx="20" cy="20" r="3"/>
    </g>
    <!-- LV pattern diamonds -->
    <g fill="none" stroke="#a07828" stroke-width="0.8" opacity="0.35">
      <rect x="-15" y="-18" width="8" height="8" rx="1" transform="rotate(45,-11,-14)"/>
      <rect x="7" y="-18" width="8" height="8" rx="1" transform="rotate(45,11,-14)"/>
      <rect x="-4" y="-3" width="8" height="8" rx="1" transform="rotate(45,0,1)"/>
      <rect x="-15" y="12" width="8" height="8" rx="1" transform="rotate(45,-11,16)"/>
      <rect x="7" y="12" width="8" height="8" rx="1" transform="rotate(45,11,16)"/>
    </g>
    <!-- Trim at top -->
    <line x1="-38" y1="-23" x2="38" y2="-23" stroke="#b08030" stroke-width="2"/>
    <!-- Side cinch straps -->
    <line x1="-36" y1="-20" x2="-32" y2="28" stroke="#b08030" stroke-width="1.5"/>
    <line x1="36" y1="-20" x2="32" y2="28" stroke="#b08030" stroke-width="1.5"/>
  </g>
</svg>
