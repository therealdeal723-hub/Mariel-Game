<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Whisk - balloon whisk -->
  <g transform="translate(64,64)">
    <!-- Handle -->
    <rect x="-4" y="-42" width="8" height="28" rx="3" fill="#c0c0c0"/>
    <!-- Handle grip ring -->
    <rect x="-5" y="-18" width="10" height="4" rx="2" fill="#a0a0a0"/>
    <!-- Handle end cap -->
    <circle cx="0" cy="-42" r="5" fill="#b0b0b0"/>
    <circle cx="0" cy="-42" r="2" fill="#a0a0a0"/>
    <!-- Whisk wires (balloon shape) -->
    <g stroke="#c0c0c0" stroke-width="1.8" fill="none">
      <path d="M0,-14 Q-18,10 -12,30 Q-5,42 0,42 Q5,42 12,30 Q18,10 0,-14"/>
      <path d="M0,-14 Q-14,5 -10,28 Q-4,40 0,42 Q4,40 10,28 Q14,5 0,-14"/>
      <path d="M0,-14 Q-8,8 -6,28 Q-2,40 0,42 Q2,40 6,28 Q8,8 0,-14"/>
      <path d="M0,-14 Q-22,15 -14,32 Q-6,44 0,42 Q6,44 14,32 Q22,15 0,-14"/>
    </g>
    <!-- Center wire -->
    <line x1="0" y1="-14" x2="0" y2="42" stroke="#c0c0c0" stroke-width="1.5"/>
    <!-- Highlight on handle -->
    <line x1="-2" y1="-38" x2="-2" y2="-20" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
