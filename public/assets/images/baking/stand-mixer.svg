<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Stand Mixer - KitchenAid style -->
  <g transform="translate(64,68)">
    <!-- Base -->
    <ellipse cx="0" cy="35" rx="32" ry="8" fill="#d84060"/>
    <rect x="-32" y="28" width="64" height="8" rx="3" fill="#e04868"/>
    <!-- Body/motor housing -->
    <path d="M-22,28 L-22,-5 Q-22,-25 -5,-28 Q5,-30 15,-25 Q22,-18 22,-5 L22,10" fill="#e04868"/>
    <!-- Head tilt band -->
    <path d="M-22,-5 Q-22,-25 -5,-28 Q5,-30 15,-25 Q22,-18 22,-5" fill="#d03858" stroke="#c03050" stroke-width="1"/>
    <!-- Speed dial -->
    <circle cx="-15" cy="5" r="5" fill="#c03050"/>
    <circle cx="-15" cy="5" r="3" fill="#d84060"/>
    <line x1="-15" y1="3" x2="-15" y2="0" stroke="#f0f0f0" stroke-width="1"/>
    <!-- Hub/attachment point -->
    <circle cx="0" cy="-25" r="4" fill="#c0c0c0"/>
    <circle cx="0" cy="-25" r="2" fill="#a0a0a0"/>
    <!-- Beater arm -->
    <path d="M0,-22 Q5,-15 5,5 Q5,18 0,22" stroke="#c0c0c0" stroke-width="3" fill="none"/>
    <!-- Whisk attachment -->
    <path d="M0,22 Q-4,30 0,38 Q4,30 0,22" stroke="#c0c0c0" stroke-width="1.5" fill="none"/>
    <path d="M0,22 Q-2,32 0,38" stroke="#c0c0c0" stroke-width="1" fill="none"/>
    <path d="M0,22 Q2,32 0,38" stroke="#c0c0c0" stroke-width="1" fill="none"/>
    <!-- Bowl -->
    <path d="M-18,18 Q-22,28 -18,38 Q0,44 18,38 Q22,28 18,18" fill="#d0d0d0" stroke="#b0b0b0" stroke-width="1"/>
    <!-- Bowl rim -->
    <ellipse cx="0" cy="18" rx="18" ry="4" fill="#e0e0e0" stroke="#c0c0c0" stroke-width="0.8"/>
    <!-- Brand strip -->
    <rect x="-16" y="12" width="18" height="4" rx="1" fill="#c03050"/>
    <text x="-7" y="15.5" font-family="Arial" font-size="3.5" fill="white" text-anchor="middle">MIXER</text>
  </g>
</svg>
