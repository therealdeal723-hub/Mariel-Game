<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rolling Pin - classic wooden -->
  <g transform="translate(64,64) rotate(-25)">
    <!-- Handles -->
    <rect x="-55" y="-6" width="15" height="12" rx="4" fill="#b8824a"/>
    <rect x="40" y="-6" width="15" height="12" rx="4" fill="#b8824a"/>
    <!-- Handle knobs -->
    <rect x="-60" y="-4" width="8" height="8" rx="4" fill="#a07040"/>
    <rect x="50" y="-4" width="8" height="8" rx="4" fill="#a07040"/>
    <!-- Main barrel -->
    <rect x="-40" y="-10" width="80" height="20" rx="10" fill="#dcc4a0"/>
    <!-- Wood grain lines -->
    <line x1="-30" y1="-4" x2="30" y2="-4" stroke="#c8aa80" stroke-width="0.8" opacity="0.5"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#c8aa80" stroke-width="0.6" opacity="0.4"/>
    <line x1="-30" y1="4" x2="30" y2="4" stroke="#c8aa80" stroke-width="0.8" opacity="0.5"/>
    <!-- Highlight -->
    <ellipse cx="0" cy="-5" rx="30" ry="4" fill="white" opacity="0.15"/>
    <!-- Flour dusting -->
    <g fill="white" opacity="0.3">
      <circle cx="-15" cy="8" r="1.5"/>
      <circle cx="5" cy="7" r="1"/>
      <circle cx="20" cy="9" r="1.5"/>
      <circle cx="-5" cy="-8" r="1"/>
      <circle cx="12" cy="-7" r="0.8"/>
    </g>
  </g>
</svg>
