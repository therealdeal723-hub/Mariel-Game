<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Denim Jacket - classic trucker style -->
  <g transform="translate(64,64)">
    <!-- Body -->
    <path d="M-32,35 L-32,-15 L-18,-25 L-5,-28 L0,-22 L5,-28 L18,-25 L32,-15 L32,35Z" fill="#4a6a8a"/>
    <!-- Collar -->
    <path d="M-5,-28 L0,-22 L-12,-14 L-18,-25Z" fill="#5a7a9a"/>
    <path d="M5,-28 L0,-22 L12,-14 L18,-25Z" fill="#5a7a9a"/>
    <!-- Sleeves -->
    <path d="M-32,-15 L-42,-5 L-42,18 L-32,22 L-32,-15Z" fill="#4a6a8a"/>
    <path d="M32,-15 L42,-5 L42,18 L32,22 L32,-15Z" fill="#4a6a8a"/>
    <!-- Button placket -->
    <rect x="-3" y="-18" width="6" height="50" fill="#4068a0" opacity="0.4"/>
    <!-- Buttons -->
    <circle cx="0" cy="-10" r="2" fill="#c0a060"/>
    <circle cx="0" cy="0" r="2" fill="#c0a060"/>
    <circle cx="0" cy="10" r="2" fill="#c0a060"/>
    <circle cx="0" cy="20" r="2" fill="#c0a060"/>
    <!-- Chest pockets with flaps -->
    <rect x="-28" y="-8" width="18" height="14" rx="1" fill="#4068a0" opacity="0.3" stroke="#3a5a7a" stroke-width="0.8"/>
    <line x1="-28" y1="-4" x2="-10" y2="-4" stroke="#3a5a7a" stroke-width="1"/>
    <circle cx="-19" cy="-4" r="1.5" fill="#c0a060"/>
    <rect x="10" y="-8" width="18" height="14" rx="1" fill="#4068a0" opacity="0.3" stroke="#3a5a7a" stroke-width="0.8"/>
    <line x1="10" y1="-4" x2="28" y2="-4" stroke="#3a5a7a" stroke-width="1"/>
    <circle cx="19" cy="-4" r="1.5" fill="#c0a060"/>
    <!-- Seam stitching -->
    <line x1="-32" y1="10" x2="-32" y2="35" stroke="#3a5a7a" stroke-width="0.8" stroke-dasharray="2,2"/>
    <line x1="32" y1="10" x2="32" y2="35" stroke="#3a5a7a" stroke-width="0.8" stroke-dasharray="2,2"/>
    <!-- Waistband -->
    <rect x="-30" y="30" width="60" height="5" rx="1" fill="#4068a0" opacity="0.3"/>
  </g>
</svg>
