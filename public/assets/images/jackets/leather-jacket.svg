<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Leather Jacket - classic moto style -->
  <g transform="translate(64,64)">
    <!-- Body -->
    <path d="M-35,35 L-35,-15 L-20,-25 L-8,-28 L0,-20 L8,-28 L20,-25 L35,-15 L35,35Z" fill="#1a1a1a"/>
    <!-- Collar/lapels -->
    <path d="M-8,-28 L0,-20 L-15,-10 L-20,-25Z" fill="#2a2a2a"/>
    <path d="M8,-28 L0,-20 L15,-10 L20,-25Z" fill="#2a2a2a"/>
    <!-- Collar fold lines -->
    <line x1="-8" y1="-28" x2="-15" y2="-10" stroke="#333" stroke-width="1"/>
    <line x1="8" y1="-28" x2="15" y2="-10" stroke="#333" stroke-width="1"/>
    <!-- Sleeves -->
    <path d="M-35,-15 L-45,-5 L-45,20 L-35,25 L-35,-15Z" fill="#1a1a1a"/>
    <path d="M35,-15 L45,-5 L45,20 L35,25 L35,-15Z" fill="#1a1a1a"/>
    <!-- Asymmetric zipper -->
    <line x1="-5" y1="-18" x2="8" y2="30" stroke="#c0c0c0" stroke-width="1.5"/>
    <!-- Zipper teeth -->
    <g stroke="#999" stroke-width="0.5">
      <line x1="-4" y1="-14" x2="0" y2="-14"/>
      <line x1="-3" y1="-8" x2="1" y2="-8"/>
      <line x1="-1" y1="-2" x2="3" y2="-2"/>
      <line x1="0" y1="4" x2="4" y2="4"/>
      <line x1="2" y1="10" x2="6" y2="10"/>
      <line x1="3" y1="16" x2="7" y2="16"/>
      <line x1="5" y1="22" x2="9" y2="22"/>
    </g>
    <!-- Pocket zippers -->
    <line x1="-30" y1="5" x2="-15" y2="8" stroke="#999" stroke-width="1"/>
    <line x1="30" y1="5" x2="18" y2="8" stroke="#999" stroke-width="1"/>
    <!-- Epaulettes -->
    <rect x="-24" y="-26" width="8" height="4" rx="1" fill="#2a2a2a" stroke="#999" stroke-width="0.5"/>
    <rect x="16" y="-26" width="8" height="4" rx="1" fill="#2a2a2a" stroke="#999" stroke-width="0.5"/>
    <!-- Belt at bottom -->
    <rect x="-32" y="28" width="64" height="4" rx="1" fill="#2a2a2a"/>
    <rect x="-3" y="27" width="6" height="6" rx="1" fill="#c0c0c0"/>
  </g>
</svg>
