<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Knit Winter Scarf - chunky cable knit -->
  <g transform="translate(64,64)">
    <!-- Main scarf body (draped/folded) -->
    <path d="M-20,-40 Q-25,-35 -28,-20 Q-30,-5 -25,10 Q-20,25 -15,38" fill="#c44040" stroke="#a83030" stroke-width="1"/>
    <path d="M-20,-40 Q-15,-35 -8,-20 Q-5,-5 -8,10 Q-12,25 -15,38" fill="#d44848"/>
    <!-- Crossover section -->
    <path d="M-8,-20 Q5,-25 18,-22 Q25,-18 22,-8 Q18,5 25,15" fill="#d44848"/>
    <path d="M-28,-20 Q-18,-28 -5,-25 Q5,-22 10,-15 Q15,-5 10,10 Q5,20 -5,28" fill="#c44040"/>
    <!-- Cable knit pattern -->
    <g stroke="#b83838" stroke-width="1" fill="none" opacity="0.5">
      <!-- Left section cables -->
      <path d="M-22,-30 Q-18,-22 -22,-14"/>
      <path d="M-18,-30 Q-22,-22 -18,-14"/>
      <path d="M-22,-10 Q-18,-2 -22,6"/>
      <path d="M-18,-10 Q-22,-2 -18,6"/>
      <path d="M-22,10 Q-18,18 -22,26"/>
      <path d="M-18,10 Q-22,18 -18,26"/>
      <!-- Cross section cables -->
      <path d="M0,-18 Q4,-12 0,-6"/>
      <path d="M4,-18 Q0,-12 4,-6"/>
      <path d="M8,-12 Q12,-6 8,0"/>
      <path d="M12,-12 Q8,-6 12,0"/>
    </g>
    <!-- Tassels on ends -->
    <g stroke="#d44848" stroke-width="1.5">
      <line x1="-22" y1="-40" x2="-24" y2="-48"/>
      <line x1="-18" y1="-40" x2="-18" y2="-48"/>
      <line x1="-14" y1="-40" x2="-12" y2="-48"/>
      <line x1="-17" y1="38" x2="-19" y2="46"/>
      <line x1="-13" y1="38" x2="-13" y2="46"/>
      <line x1="-9" y1="36" x2="-7" y2="44"/>
    </g>
    <!-- Right tail -->
    <path d="M22,-8 Q28,-2 30,10 Q30,22 25,32" fill="#d44848" stroke="#a83030" stroke-width="0.8"/>
    <g stroke="#d44848" stroke-width="1.5">
      <line x1="23" y1="32" x2="21" y2="40"/>
      <line x1="27" y1="32" x2="27" y2="40"/>
    </g>
  </g>
</svg>
