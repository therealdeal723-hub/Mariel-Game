<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120">
  <!-- Mariel - based on photo: dark hair, blue/clear glasses, nose ring, gold necklaces, tan top -->

  <!-- Body / tan-gold top -->
  <path d="M22,65 Q20,60 18,55 Q22,48 40,46 Q58,48 62,55 Q60,60 58,65 L58,110 Q58,115 53,115 L27,115 Q22,115 22,110Z" fill="#c8a870"/>
  <!-- Lace/pattern detail on top -->
  <g opacity="0.25" fill="#b89860">
    <line x1="25" y1="55" x2="55" y2="55" stroke="#b89860" stroke-width="0.8"/>
    <line x1="24" y1="60" x2="56" y2="60" stroke="#b89860" stroke-width="0.5"/>
    <line x1="23" y1="65" x2="57" y2="65" stroke="#b89860" stroke-width="0.5"/>
  </g>
  <!-- V-neckline -->
  <path d="M30,48 Q35,56 40,58 Q45,56 50,48" stroke="#b89860" stroke-width="1" fill="none"/>

  <!-- Neck -->
  <rect x="35" y="38" width="10" height="12" rx="4" fill="#e8c8a0"/>

  <!-- Gold necklaces -->
  <path d="M32,48 Q40,55 48,48" stroke="#daa520" stroke-width="1" fill="none"/>
  <path d="M30,48 Q40,58 50,48" stroke="#daa520" stroke-width="0.8" fill="none"/>
  <circle cx="40" cy="56" r="1.5" fill="#daa520"/>

  <!-- Head -->
  <ellipse cx="40" cy="28" rx="18" ry="20" fill="#e8c8a0"/>

  <!-- Dark hair -->
  <path d="M22,25 Q22,8 40,5 Q58,8 58,25 Q58,18 55,14 Q48,8 40,7 Q32,8 25,14 Q22,18 22,25Z" fill="#1a1a2a"/>
  <!-- Hair sides flowing down -->
  <path d="M22,25 Q18,30 16,42 Q15,48 18,50 Q20,46 22,38 Q22,32 22,25Z" fill="#1a1a2a"/>
  <path d="M58,25 Q62,30 64,42 Q65,48 62,50 Q60,46 58,38 Q58,32 58,25Z" fill="#1a1a2a"/>
  <!-- Hair volume on top -->
  <path d="M24,18 Q30,4 40,3 Q50,4 56,18 Q50,10 40,8 Q30,10 24,18Z" fill="#222238"/>

  <!-- Eyebrows -->
  <path d="M30,22 Q33,20 36,21" stroke="#2a2a3a" stroke-width="1.2" fill="none"/>
  <path d="M44,21 Q47,20 50,22" stroke="#2a2a3a" stroke-width="1.2" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="33" cy="26" rx="3.5" ry="3" fill="white"/>
  <ellipse cx="47" cy="26" rx="3.5" ry="3" fill="white"/>
  <circle cx="33" cy="26" r="2" fill="#3a2a1a"/>
  <circle cx="47" cy="26" r="2" fill="#3a2a1a"/>
  <circle cx="33.8" cy="25.5" r="0.8" fill="white"/>
  <circle cx="47.8" cy="25.5" r="0.8" fill="white"/>

  <!-- Glasses (blue/clear frames) -->
  <rect x="28" y="22" width="12" height="9" rx="3" fill="none" stroke="#6a8ab0" stroke-width="1.5"/>
  <rect x="42" y="22" width="12" height="9" rx="3" fill="none" stroke="#6a8ab0" stroke-width="1.5"/>
  <line x1="40" y1="26" x2="42" y2="26" stroke="#6a8ab0" stroke-width="1.2"/>
  <!-- Temple arms -->
  <line x1="28" y1="25" x2="22" y2="24" stroke="#6a8ab0" stroke-width="1.2"/>
  <line x1="54" y1="25" x2="58" y2="24" stroke="#6a8ab0" stroke-width="1.2"/>

  <!-- Nose -->
  <path d="M40,28 Q39,32 38,34" stroke="#d8b890" stroke-width="1" fill="none"/>
  <!-- Nose ring -->
  <circle cx="37" cy="33" r="1.2" fill="none" stroke="#c0c0c0" stroke-width="0.8"/>

  <!-- Warm smile -->
  <path d="M34,37 Q40,42 46,37" stroke="#c47060" stroke-width="1.5" fill="none"/>
  <!-- Teeth showing -->
  <path d="M36,38 Q40,41 44,38" fill="white" opacity="0.7"/>

  <!-- Blush -->
  <circle cx="28" cy="34" r="3" fill="#e8a0a0" opacity="0.3"/>
  <circle cx="52" cy="34" r="3" fill="#e8a0a0" opacity="0.3"/>
</svg>
