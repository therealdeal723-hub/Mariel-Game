<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Monstera Deliciosa - classic split leaf -->
  <g transform="translate(64,68)">
    <!-- Stem -->
    <path d="M0,45 Q-3,25 2,5" stroke="#2d5a1e" stroke-width="4" fill="none"/>
    <!-- Main leaf -->
    <path d="M0,-5 Q-15,-25 -35,-40 Q-45,-35 -50,-20 Q-48,-10 -40,-5 Q-35,-8 -30,-15 Q-28,-5 -20,0 Q-15,-5 -12,-12 Q-8,0 0,5 Q8,0 12,-12 Q15,-5 20,0 Q28,-5 30,-15 Q35,-8 40,-5 Q48,-10 50,-20 Q45,-35 35,-40 Q15,-25 0,-5Z" fill="#1a8a3e"/>
    <!-- Fenestrations (holes) -->
    <ellipse cx="-22" cy="-22" rx="6" ry="8" fill="#2a1f3d" transform="rotate(-20,-22,-22)"/>
    <ellipse cx="22" cy="-22" rx="6" ry="8" fill="#2a1f3d" transform="rotate(20,22,-22)"/>
    <ellipse cx="-12" cy="-30" rx="4" ry="5" fill="#2a1f3d"/>
    <ellipse cx="12" cy="-30" rx="4" ry="5" fill="#2a1f3d"/>
    <!-- Midrib -->
    <line x1="0" y1="-5" x2="0" y2="-38" stroke="#15712f" stroke-width="2"/>
    <!-- Leaf veins -->
    <line x1="0" y1="-15" x2="-25" y2="-25" stroke="#15712f" stroke-width="1.2" opacity="0.6"/>
    <line x1="0" y1="-15" x2="25" y2="-25" stroke="#15712f" stroke-width="1.2" opacity="0.6"/>
    <line x1="0" y1="-25" x2="-18" y2="-36" stroke="#15712f" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-25" x2="18" y2="-36" stroke="#15712f" stroke-width="1" opacity="0.5"/>
    <!-- Pot -->
    <path d="M-18,45 L-15,28 L15,28 L18,45Z" fill="#c4663a"/>
    <rect x="-20" y="25" width="40" height="6" rx="2" fill="#d4764a"/>
  </g>
</svg>
