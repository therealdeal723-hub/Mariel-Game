<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Monstera Adansonii - Swiss Cheese Plant with many holes -->
  <g transform="translate(64,68)">
    <!-- Stem -->
    <path d="M0,45 Q2,30 -1,10" stroke="#2d5a1e" stroke-width="3" fill="none"/>
    <!-- Leaf 1 (main, left-leaning) -->
    <path d="M-2,8 Q-20,-5 -30,-25 Q-35,-35 -25,-42 Q-10,-45 0,-35 Q-5,-20 -2,8Z" fill="#22a848"/>
    <!-- Holes in leaf 1 -->
    <ellipse cx="-15" cy="-20" rx="4" ry="5" fill="#2a1f3d"/>
    <ellipse cx="-22" cy="-30" rx="3" ry="4" fill="#2a1f3d"/>
    <ellipse cx="-8" cy="-32" rx="3" ry="4" fill="#2a1f3d"/>
    <ellipse cx="-10" cy="-14" rx="2.5" ry="3" fill="#2a1f3d"/>
    <!-- Leaf 2 (right) -->
    <path d="M2,5 Q18,-8 28,-28 Q32,-38 22,-44 Q8,-42 0,-32 Q3,-18 2,5Z" fill="#1e9940"/>
    <!-- Holes in leaf 2 -->
    <ellipse cx="14" cy="-22" rx="3.5" ry="5" fill="#2a1f3d"/>
    <ellipse cx="20" cy="-33" rx="3" ry="3.5" fill="#2a1f3d"/>
    <ellipse cx="8" cy="-30" rx="2.5" ry="3" fill="#2a1f3d"/>
    <!-- Small trailing leaf -->
    <path d="M5,15 Q15,5 20,-5 Q22,-12 16,-14 Q10,-10 5,15Z" fill="#28b850" opacity="0.8"/>
    <ellipse cx="14" cy="-4" rx="2" ry="2.5" fill="#2a1f3d"/>
    <!-- Veins -->
    <line x1="-2" y1="5" x2="-18" y2="-30" stroke="#1a7a32" stroke-width="1" opacity="0.5"/>
    <line x1="2" y1="5" x2="16" y2="-32" stroke="#1a7a32" stroke-width="1" opacity="0.5"/>
    <!-- Hanging pot (macrame style) -->
    <path d="M-15,45 L-12,30 L12,30 L15,45Z" fill="#c4663a"/>
    <rect x="-17" y="27" width="34" height="5" rx="2" fill="#d4764a"/>
    <!-- Macrame strings -->
    <line x1="-10" y1="27" x2="-15" y2="15" stroke="#ddc" stroke-width="1.5"/>
    <line x1="10" y1="27" x2="15" y2="15" stroke="#ddc" stroke-width="1.5"/>
    <line x1="-15" y1="15" x2="0" y2="5" stroke="#ddc" stroke-width="1.5"/>
    <line x1="15" y1="15" x2="0" y2="5" stroke="#ddc" stroke-width="1.5"/>
  </g>
</svg>
