    <!-- Main leaf base -->
    <path d="M0,-2 Q-18,-20 -32,-35 Q-42,-30 -45,-15 Q-42,-5 -32,0 Q-28,-8 -22,-12 Q-15,0 0,5 Q15,0 22,-12 Q28,-8 32,0 Q42,-5 45,-15 Q42,-30 32,-35 Q18,-20 0,-2Z" fill="#1a8a3e"/>
    <!-- Cream constellation variegation patches -->
    <path d="M-20,-18 Q-15,-25 -8,-20 Q-12,-12 -20,-18Z" fill="#f5ecd0" opacity="0.85"/>
    <path d="M15,-15 Q22,-22 28,-15 Q22,-8 15,-15Z" fill="#f5ecd0" opacity="0.8"/>
    <path d="M-5,-28 Q0,-35 8,-30 Q5,-24 -5,-28Z" fill="#f0e8c8" opacity="0.75"/>
    <circle cx="35" cy="-10" r="5" fill="#f5ecd0" opacity="0.7"/>
    <circle cx="-35" cy="-12" r="4" fill="#f0e8c8" opacity="0.65"/>
