    <line x1="0" y1="-12" x2="-22" y2="-20" stroke="#15712f" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-12" x2="22" y2="-20" stroke="#15712f" stroke-width="1" opacity="0.4"/>
    <!-- White ceramic pot -->
    <path d="M-16,45 L-13,28 L13,28 L16,45Z" fill="#f0ebe0"/>
    <rect x="-18" y="25" width="36" height="5" rx="2" fill="#faf5ee"/>
