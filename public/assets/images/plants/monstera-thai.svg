    <circle cx="8" cy="-25" r="3" fill="#f5ecd0" opacity="0.7"/>
    <!-- Fenestrations -->
    <ellipse cx="-18" cy="-22" rx="4" ry="5" fill="#2a1f3d"/>
    <ellipse cx="18" cy="-22" rx="4" ry="5" fill="#2a1f3d"/>
    <!-- Midrib and veins -->
